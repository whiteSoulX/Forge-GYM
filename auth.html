<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Sign in | FORGE Gym</title><meta name="description" content="Sign in or create your FORGE Gym account."><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@600;700;800&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet"><link rel="stylesheet" href="css/style.css"></head>
<body class="auth-page"><header class="nav"><div class="nav-inner"><a class="brand" href="index.html"><img src="assets/logo.png" alt="FORGE logo"></a><a class="back-link" href="index.html">← Back to home</a></div></header><main class="auth-main"><div class="auth-intro"><p class="eyebrow"><span class="pulse-dot"></span> Your training, in one place</p><h1>Show up.<br><span class="hl">Log in.</span></h1><p>Manage your membership, book classes, and keep your momentum moving.</p></div><section class="auth-card"><div class="auth-tabs"><button class="auth-tab is-active" data-auth-mode="signin">Sign in</button><button class="auth-tab" data-auth-mode="signup">Create account</button></div><form class="auth-form" id="authForm"><div class="field signup-only"><label for="authName">Full name</label><input id="authName" type="text" placeholder="Jane Cooper"></div><div class="field"><label for="authEmail">Email address</label><input id="authEmail" type="email" placeholder="jane@email.com" required></div><div class="field signup-only"><label for="authPhone">Phone number</label><input id="authPhone" type="tel" placeholder="+880 1775 511607"></div><div class="field"><label for="authPassword">Password</label><input id="authPassword" type="password" placeholder="Enter your password" required minlength="6"></div><button class="btn btn-primary btn-block" type="submit" id="authSubmit">Sign in</button><div class="form-success" id="authSuccess">You're in. Taking you to your membership options...</div></form><div class="auth-divider"><span>or continue with</span></div><div class="social-login"><button class="social-btn" type="button" data-social="Google"><b>G</b> Google</button><button class="social-btn" type="button" data-social="Facebook"><b>f</b> Facebook</button><button class="social-btn" type="button" data-social="Instagram"><b>◎</b> Instagram</button><button class="social-btn" type="button" data-social="Phone"><b>⌕</b> Phone</button></div><p class="demo-note">Demo mode: connect these actions to your identity provider before launch.</p></section></main><script src="js/script.js"></script></body></html>
